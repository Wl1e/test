<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity Addressables 资源托管</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 2.5rem 3rem;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            opacity: 0.9;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #f0f6fc;
        }
        p {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            color: #8b949e;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1c2128;
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            border: 1px solid #30363d;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background: #3fb950;
            border-radius: 50%;
            box-shadow: 0 0 6px #3fb950;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(63,185,80,0.4); }
            70% { box-shadow: 0 0 0 8px rgba(63,185,80,0); }
            100% { box-shadow: 0 0 0 0 rgba(63,185,80,0); }
        }
        .footer {
            font-size: 0.8rem;
            color: #484f58;
        }
        a {
            color: #58a6ff;
            text-decoration: none;
            border-bottom: 1px dotted #58a6ff;
        }
        a:hover {
            color: #79c0ff;
            border-bottom-color: #79c0ff;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📦</div>
        <h1>Unity Addressables 资源托管中</h1>
        <p>此站点为游戏资源分发提供支持。所有资源文件均通过 Unity Addressables 系统动态加载，请勿直接访问目录。</p>
        <div class="status">
            <span class="status-dot"></span>
            <span>服务运行正常</span>
        </div>
        <div class="footer">
            <p>由 <a href="https://pages.github.com">GitHub Pages</a> 提供支持</p>
        </div>
    </div>
</body>
</html>
